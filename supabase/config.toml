[project]
name = "questlearn-ai"
version = "0.1.0"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.vercel.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enabled = true
double_confirm_changes = true
enable_confirmations = true
min_password_length = 6

[auth.external.google]
enabled = true
client_id = ""
secret = ""
redirect_uri = "http://localhost:3000/api/auth/callback"
url_patterns = []

[edge_runtime]
enabled = true
policy_area = "all"

[db]
migration_directory = "migrations"

[db.policies]
enabled = true

[api]
enabled = true
port = 54321
schemas = ["public", "auth", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
global_db_benchmarks = false

[api.tls]
enabled = false

[storage]
enabled = true
file_size_limit = "50MB"

[storage.buckets.avatars]
public = true
file_size_limit = "5MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif"]

[storage.buckets.items]
public = true
file_size_limit = "10MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif", "image/svg+xml"]

[storage.buckets.bosses]
public = true
file_size_limit = "10MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif"]

[storage.buckets.achievements]
public = true
file_size_limit = "5MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif"]

[analytics]
enabled = false
